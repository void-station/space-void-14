- type: entity
  name: hypospray "Blue Shield"
  parent: BaseItem
  description: A sterile injector for rapid administration of drugs to patients.
  id: HypoBlueShield
  components:
  - type: Sprite
    sprite: _Erida/Objects/Specific/Medical/hypospray.rsi
    state: hypoblueshield
  - type: Item
    sprite: _Erida/Objects/Specific/Medical/hypospray.rsi
  - type: SolutionContainerManager
    solutions:
      hypospray:
        maxVol: 15
  - type: RefillableSolution
    solution: hypospray
  - type: ExaminableSolution
    solution: hypospray
    heldOnly: true # Allow examination only when held in hand.
    exactVolume: true
  - type: Injector
    solutionName: hypospray
    activeModeProtoId: HypopenDynamicMode
    allowedModes:
    - HyposprayInjectMode
    - HypopenDynamicMode
  - type: UseDelay
    delay: 2.5
  - type: StaticPrice
    price: 550
