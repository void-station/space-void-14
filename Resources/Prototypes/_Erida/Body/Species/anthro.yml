- type: entity
  parent:
  - AppearanceAnthropomorph
  - BaseSpeciesMobOrganic
  id: MobAnthropomorph
  name: Urist McAnthro
  components:
  - type: Butcherable
    spawned:
    - id: FoodMeatHuman
      amount: 5
  - type: MeleeWeapon
    soundHit:
      path: /Audio/Weapons/pierce.ogg
    animation: WeaponArcClaw
    damage:
      types:
        Piercing: 2
        Slash: 3
  - type: LanguageSpeaker
    currentLanguage: TauCetiBasic
  - type: LanguageKnowledge #backmen: languages
    speaks:
    - TauCetiBasic
    - Canilunzt
    understands:
    - TauCetiBasic
    - Canilunzt
  - type: Carriable

