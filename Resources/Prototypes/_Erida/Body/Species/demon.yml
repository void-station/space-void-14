- type: markingsGroup
  parent: Undergarments
  id: Demon
  limits:
    enum.HumanoidVisualLayers.Hair:
      limit: 10
      required: false
    enum.HumanoidVisualLayers.FacialHair:
      limit: 10
      required: false
    enum.HumanoidVisualLayers.Chest:
      limit: 10
      required: false
    enum.HumanoidVisualLayers.Snout:
      limit: 10
      required: false
    enum.HumanoidVisualLayers.LArm:
      limit: 10
      required: false
    enum.HumanoidVisualLayers.RArm:
      limit: 10
      required: false
    enum.HumanoidVisualLayers.LHand:
      limit: 10
      required: false
    enum.HumanoidVisualLayers.RHand:
      limit: 10
      required: false
    enum.HumanoidVisualLayers.LLeg:
      limit: 10
      required: false
    enum.HumanoidVisualLayers.RLeg:
      limit: 10
      required: false
    enum.HumanoidVisualLayers.LFoot:
      limit: 10
      required: false
    enum.HumanoidVisualLayers.RFoot:
      limit: 10
      required: false
    enum.HumanoidVisualLayers.Tail:
      limit: 10
      required: true
      default: [ TailDemon ]
    enum.HumanoidVisualLayers.Special:
      limit: 0
      required: false

- type: entity
  parent: BaseSpeciesAppearance
  id: AppearanceDemon
  name: Demon appearance
  components:
  - type: Inventory
    femaleDisplacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: Mobs/Species/Human/displacement.rsi
            state: jumpsuit-female
  - type: InitialBody
    organs:
      Torso: OrganDemonTorso
      Head: OrganDemonHead
      ArmLeft: OrganDemonArmLeft
      ArmRight: OrganDemonArmRight
      HandRight: OrganDemonHandRight
      HandLeft: OrganDemonHandLeft
      LegLeft: OrganDemonLegLeft
      LegRight: OrganDemonLegRight
      FootLeft: OrganDemonFootLeft
      FootRight: OrganDemonFootRight
      Brain: OrganDemonBrain
      Eyes: OrganDemonEyes
      Tongue: OrganDemonTongue
      Appendix: OrganDemonAppendix
      Ears: OrganDemonEars
      Lungs: OrganDemonLungs
      Heart: OrganDemonHeart
      Stomach: OrganDemonStomach
      Liver: OrganDemonLiver
      Kidneys: OrganDemonKidneys
  - type: HumanoidProfile
    species: Demon

- type: entity
  parent:
  - AppearanceDemon
  - BaseSpeciesMobOrganic
  id: MobDemon
  name: Urist McHands
  components:
  - type: Butcherable
    spawned:
    - id: FoodMeatHuman
      amount: 5
  - type: LanguageSpeaker
    currentLanguage: TauCetiBasic
  - type: LanguageKnowledge #backmen: languages
    speaks:
    - TauCetiBasic
    - Demonic
    understands:
    - TauCetiBasic
    - Demonic

- type: entity
  parent: OrganBase
  id: OrganDemon
  abstract: true
  suffix: Demon

- type: entity
  id: OrganDemonMetabolizer
  abstract: true
  components:
  - type: Metabolizer
    metabolizerTypes: [ Human ]

- type: entity
  parent: OrganDemon
