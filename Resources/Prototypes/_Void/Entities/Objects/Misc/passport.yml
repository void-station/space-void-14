# Base abstract for all ID documents (passports, IDs, dogtags)
- type: entity
  parent: BaseItem
  id: PassportBase
  abstract: true
  name: passport
  description: A standard identification document.
  components:
  - type: Sprite
    sprite: _Void/Objects/passport/passport.rsi
    layers:
    - state: closed
      map: ["enum.PassportVisualLayers.Base"]
  - type: Item
    size: Small
    storedRotation: -90
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.PassportVisuals.Open:
        enum.PassportVisualLayers.Base:
          True: { state: open }
          False: { state: closed }
  - type: Passport
  - type: ActivatableUI
    key: enum.PassportUiKey.Key
  - type: UserInterface
    interfaces:
      enum.PassportUiKey.Key:
        type: PassportBoundUserInterface
  - type: Tag
    tags:
    - Document

# Generic passport (fallback / stateless)
- type: entity
  parent: PassportBase
  id: Passport
  name: passport
  description: A standard identification passport with no national markings.

