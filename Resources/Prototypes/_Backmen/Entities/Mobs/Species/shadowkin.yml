- type: entity
  save: false
  parent: BaseMobSpeciesOrganic
  id: MobShadowkinBase
  name: Urist McFloof
  abstract: true
  components:
  - type: OnGhostAttemptDamage # kills with bloodloss instead of Asphyxiation
  - type: Butcherable
    butcheringType: Spike
    spawned:
    - id: ADTFoodMeatShadowkin
      amount: 4
  - type: LanguageSpeaker
    currentLanguage: TauCetiBasic
  - type: LanguageKnowledge #backmen: languages
    speaks:
    - TauCetiBasic
    - Mar
    understands:
    - TauCetiBasic
    - Mar
  - type: HumanoidAppearance
    eyeColor: '#ffffff'
    species: Shadowkin
  - type: Hunger
  - type: Thirst
  - type: Icon
    sprite: Backmen/Mobs/Species/Shadowkin/parts.rsi
    state: full
  - type: Body
    prototype: Shadowkin
    requiredLegs: 2
  - type: Puller
    needsHands: false
  - type: Speech
    speechSounds: Shadowkin
    allowedEmotes: ['Thump', 'Purse', 'Wurble', 'ShadowkinGrowl']
  - type: BodyEmotes
    soundsId: ShadowkinBodyEmotes
  - type: Vocal
    sounds:
      Male: MaleShadowkin
      Female: FemaleShadowkin
      Unsexed: MaleShadowkin
  - type: Flammable
    damage:
      types:
        Heat: 0.75 # burn more
  - type: Damageable
    damageContainer: Biological # Shadowkin
    damageModifierSet: Shadowkin
  - type: Barotrauma
    damage:
      types:
        Blunt: 1 # per second, scales with pressure and other constants.
  - type: Bloodstream
    bloodReagents:
      reagents:
      - ReagentId: ShadowkinBlood
        Quantity: 1
    bloodlossDamage:
      types:
        Bloodloss:
          1
    bloodlossHealDamage:
      types:
        Bloodloss:
          -0.25
  - type: Temperature
    heatDamageThreshold: 330
    coldDamageThreshold: 230
    currentTemperature: 310.15
    specificHeat: 46
    coldDamage:
      types:
        Cold : 0.05 #per second, scales with temperature & other constants
    heatDamage:
      types:
        Heat : 0.25 #per second, scales with temperature & other constants
  - type: TemperatureSpeed
    thresholds:
      273: 0.8
      240: 0.6
      200: 0.4
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 130 #lower density
        restitution: 0.0
        mask:
          - MobMask
        layer:
          - MobLayer
  - type: Sprite
  - type: Eye
    zoom: "0.85, 0.85"
  - type: MeleeWeapon
    soundHit:
      collection: Punch
    animation: WeaponArcClaw
    damage:
      types:
        Blunt: 2
        Slash: 3
        Piercing: 1
  - type: InteractionPopup
    interactSuccessString: petting-success-soft-floofy
    interactSuccessSound: /Audio/Effects/thudswoosh.ogg
    messagePerceivedByOthers: hugging-success-generic-others
  - type: MovementSpeedModifier
    baseWalkSpeed : 2.7
    baseSprintSpeed : 4.5
  - type: Respirator
    gaspEmote: null
    damage:
      types:
        Asphyxiation: 0.0
    damageRecovery:
      types:
        Asphyxiation: 0.0
  # Erida-start
  - type: ScaleOnSpawn
    scale: 0.85, 0.85
  # Erida-end

- type: entity
  save: false
  parent: MobShadowkinBase
  id: MobShadowkinDummy
  categories: [ HideSpawnMenu ]
  description: A dummy shadowkin meant to be used in character setup.
