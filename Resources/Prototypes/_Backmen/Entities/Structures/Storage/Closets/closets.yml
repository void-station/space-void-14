- type: entity
  id: LockerBlueShield
  parent: LockerBase
  name: officer "Blueshield"'s locker
  components:
  - type: Sprite
    netsync: false
    sprite: _Backmen/Structures/Storage/blue.rsi
    noRot: true
    layers:
    - state: egov
      map: ["enum.StorageVisualLayers.Base"]
    - state: egov_door
      map: ["enum.StorageVisualLayers.Door"]
    - state: locked
      map: ["enum.LockVisualLayers.Lock"]
      shader: unshaded
    - state: welded
      visible: false
      map: ["enum.WeldableLayers.BaseWelded"]
  - type: EntityStorageVisuals
    stateBaseClosed: egov
    stateDoorOpen: egov_open
    stateDoorClosed: egov_door
  - type: AccessReader
    access: [ [ "CentralCommand" ] ]

- type: entity
  id: LockerSecurityPilot
  parent: LockerSecurity
  name: security pilot locker
  description: This is where the pilot keeps his belongings.
  components:
  - type: Sprite
    netsync: false
    sprite: _Backmen/Structures/Storage/sec-pilot.rsi
    noRot: true
    layers:
    - state: sec
      map: ["enum.StorageVisualLayers.Base"]
    - state: sec_pilot_door
      map: ["enum.StorageVisualLayers.Door"]
    - state: locked
      map: ["enum.LockVisualLayers.Lock"]
      shader: unshaded
    - state: welded
      visible: false
      map: ["enum.WeldableLayers.BaseWelded"]
  - type: EntityStorageVisuals
    stateBaseClosed: sec
    stateDoorOpen: sec_open
    stateDoorClosed: sec_pilot_door
